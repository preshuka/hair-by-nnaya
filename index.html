<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hair by Nnaya</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: Poppins, sans-serif;
    background: linear-gradient(to right, black, #5a3b00, black);
    color: white;
}

/* background fix */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    z-index: -1;
}

/* container */
.container {
    max-width: 400px;
    margin: auto;
    padding: 20px;
    position: relative;
    z-index: 10;
}

/* logo */
.logo {
    width: 100%;
    border-radius: 20px;
    margin-bottom: 20px;
}

/* form */
form {
    display: flex;
    flex-direction: column;
}

label {
    margin-top: 10px;
}

input, select, textarea {
    padding: 12px;
    border-radius: 15px;
    border: none;
    margin-bottom: 10px;
    background: #d9d9d9;
}

/* checkbox */
.row {
    display: flex;
    justify-content: space-around;
    margin-bottom: 10px;
}

/* button */
button {
    padding: 15px;
    border-radius: 20px;
    border: none;
    background: goldenrod;
    font-size: 18px;
}

</style>
</head>

<body>

<div class="container">

<img src="logo.jpg" class="logo">

<form onsubmit="sendBooking(event)">

<label>Date</label>
<input type="date" id="date">

<label>Time</label>
<input type="time" id="time">

<label>Style</label>
<input type="text" id="style">

<label>Color</label>
<input type="text" id="color">

<label>Length</label>
<select id="length">
<option>Short</option>
<option>Medium</option>
<option>Long</option>
</select>

<label>Location</label>
<select id="location">
<option>Salon</option>
<option>Home service</option>
</select>

<label>Extension</label>

<div class="row">
<label><input type="checkbox" id="buying"> Buying</label>
<label><input type="checkbox" id="bringing"> Bringing</label>
</div>

<label>Feedback</label>
<textarea id="feedback"></textarea>

<label>Rating</label>
<select id="rating">
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
</select>

<button type="submit">Book Now</button>

</form>

</div>


<script>

function sendBooking(e) {

e.preventDefault();

let date = document.getElementById("date").value;
let time = document.getElementById("time").value;
let style = document.getElementById("style").value;
let color = document.getElementById("color").value;
let length = document.getElementById("length").value;
let location = document.getElementById("location").value;

let buying = document.getElementById("buying").checked ? "Buying" : "";
let bringing = document.getElementById("bringing").checked ? "Bringing" : "";

let feedback = document.getElementById("feedback").value;
let rating = document.getElementById("rating").value;


let message =
"New Booking%0A" +
"Date: " + date + "%0A" +
"Time: " + time + "%0A" +
"Style: " + style + "%0A" +
"Color: " + color + "%0A" +
"Length: " + length + "%0A" +
"Location: " + location + "%0A" +
"Extension: " + buying + " " + bringing + "%0A" +
"Feedback: " + feedback + "%0A" +
"Rating: " + rating;


window.open(
"https://wa.me/2348032178073?text=" + message,
"_blank"
);

}

</script>

</body>
</html>
