<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hair by Nnaya</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:linear-gradient(135deg,#1a001f,#000,#2b0033);
color:white;
}

/* ===== TOP GRAPHICS ===== */

.header{
text-align:center;
padding:50px 20px;
background:linear-gradient(135deg,#2b0033,#ff4da6,#660066);
box-shadow:0 0 40px #ff66cc;
}

.title{
font-family:"Playfair Display";
font-size:55px;
font-weight:bold;
}

.subtitle{
font-size:18px;
opacity:0.9;
}

/* ===== GLASS CARD ===== */

.container{

max-width:600px;
margin:40px auto;

background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);

padding:25px;
border-radius:15px;

box-shadow:0 0 20px #ff66cc;

}

h2{
text-align:center;
}

/* ===== INPUT ===== */

label{
display:block;
margin-top:12px;
font-size:14px;
}

input,select,textarea{

width:100%;
padding:12px;
border:none;
border-radius:8px;
margin-top:5px;

background:rgba(255,255,255,0.2);
color:white;

}

input::placeholder{
color:white;
}

/* ===== CHECKBOX ===== */

.row{
display:flex;
gap:20px;
align-items:center;
}

/* ===== BUTTON ===== */

button{

width:100%;
padding:14px;
margin-top:20px;

border:none;
border-radius:10px;

font-size:18px;
font-weight:bold;

background:#ff4da6;
color:white;

cursor:pointer;

}

button:hover{
background:#ff1a8c;
}

/* ===== POPUP ===== */

.popup{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:rgba(0,0,0,0.8);

display:none;

justify-content:center;
align-items:center;

}

.popup-box{

background:white;
color:black;

padding:25px;
border-radius:10px;

text-align:center;

}

</style>
</head>


<body>


<div class="header">

<div class="title">Hair by Nnaya</div>

<div class="subtitle">
Luxury Braids • Home Service • Book Now
</div>

</div>



<form action="https://formsubmit.co/preshuka490@gmail.com" method="POST" onsubmit="sendWhatsApp()">



<div class="container">

<h2>Book Appointment</h2>


<label>Name</label>
<input name="Name" required>


<label>Phone</label>
<input name="Phone" required>


<label>Date</label>
<input type="date" name="Date" required>


<label>Time</label>
<input type="time" name="Time">


<label>Style</label>
<input name="Style">


<label>Color</label>
<input name="Color">


<label>Length</label>

<select name="Length">
<option>Short</option>
<option>Medium</option>
<option>Long</option>
</select>


<label>Location</label>

<select name="Location">
<option>Salon</option>
<option>Home Service</option>
</select>


<label>Extension</label>

<div class="row">
<input type="checkbox" name="Extension" value="Buying">Buying
<input type="checkbox" name="Extension" value="Bringing">Bringing
</div>


<label>Upload Style</label>
<input type="file" name="Style Image">


<label>Feedback</label>
<textarea name="Feedback"></textarea>


<label>Rating</label>

<select name="Rating">
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
</select>


<button type="submit" onclick="showPopup()">Book Now</button>


</div>

</form>



<div class="popup" id="popup">

<div class="popup-box">

<h3>Thank you for booking with Hair by Nnaya ✨</h3>

<p>Your appointment request has been sent</p>

<button onclick="closePop()">OK</button>

</div>

</div>



<script>

function showPopup(){

document.getElementById("popup").style.display="flex"

}

function closePop(){

document.getElementById("popup").style.display="none"

}



function sendWhatsApp(){

let number="2348032178073"

let msg="New booking from Hair by Nnaya website"

window.open("https://wa.me/"+number+"?text="+msg)

}


</script>



</body>
</html>
