<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hair by Nnaya</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<style>

/* ================= BODY ================= */

body{
margin:0;
font-family:Poppins;
color:white;

background:
linear-gradient(
180deg,
#ff6600 0%,
#ff6600 25%,
#000 100%
);

display:flex;
justify-content:center;
min-height:100vh;
position:relative;
}

/* DARK OVERLAY */

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:linear-gradient(
to bottom,
rgba(0,0,0,0.2),
rgba(0,0,0,0.7)
);

z-index:-1;
}


/* ================= APP ================= */

.app{
width:100%;
max-width:420px;
min-height:100vh;
}


/* ================= HEADER ================= */

.header{
text-align:center;
padding:40px 20px;

background:linear-gradient(
135deg,#000,#ff6600);

border-bottom-left-radius:25px;
border-bottom-right-radius:25px;

box-shadow:0 0 25px orange;
}

.title{
font-family:"Playfair Display";
font-size:40px;
}


/* ================= CARD ================= */

.card{

margin:20px;
padding:20px;

border-radius:25px;

background:rgba(0,0,0,0.45);

backdrop-filter:blur(18px);

box-shadow:0 0 25px orange;

}


/* ================= INPUTS ================= */

label{
display:block;
margin-top:12px;
}

input,select,textarea{

width:100%;
padding:12px;
margin-top:5px;

border:none;
border-radius:15px;

background:rgba(255,255,255,0.2);
color:white;

}


/* ================= ROW ================= */

.row{
display:flex;
gap:15px;
}


/* ================= BUTTON ================= */

button{

width:100%;
padding:14px;
margin-top:20px;

border:none;
border-radius:20px;

font-size:18px;

background:orange;
color:white;

cursor:pointer;

}


/* ================= POPUP ================= */

.popup{

position:fixed;
bottom:-100%;
left:0;

width:100%;

display:flex;
justify-content:center;

transition:0.4s;

}

.popup.show{
bottom:0;
}

.popup-box{

background:white;
color:black;

width:90%;
max-width:400px;

padding:20px;

border-radius:20px 20px 0 0;

text-align:center;

box-shadow:0 0 20px black;

}

</style>
</head>



<body>



<div class="app">



<div class="header">

<div class="title">Hair by Nnaya</div>

<div class="subtile">
  Luxury Braids . BOOK NOW
</div>
</div>



<form
action="https://formsubmit.co/preshuka490@gmail.com"
method="POST"
onsubmit="return sendData()"
>



<div class="card">



<label>Name</label>
<input id="name" name="Name" required>


<label>Phone</label>
<input id="phone" name="Phone" required>


<label>Date</label>
<input id="date" name="Date" type="date">


<label>Time</label>
<input id="time" name="Time" type="time">


<label>Style</label>
<input id="style" name="Style">


<label>Color</label>
<input id="color" name="Color">


<label>Length</label>

<select id="length" name="Length">
<option>Short</option>
<option>Medium</option>
<option>Long</option>
</select>



<label>Location</label>

<select id="location" name="Location">
<option>Salon</option>
<option>Home Service</option>
</select>



<label>Extension</label>

<div class="row">

<label>
<input id="ext1" type="checkbox"> Buying
</label>

<label>
<input id="ext2" type="checkbox"> Bringing
</label>

</div>



<label>Feedback</label>

<textarea id="feedback" name="Feedback"></textarea>



<label>Rating</label>

<select id="rating" name="Rating">
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
</select>



<button type="submit">

Book Now

</button>



</div>

</form>

</div>



<div class="popup" id="popup">

<div class="popup-box">

<h3>Thank you for booking ✨</h3>

<p>Your request has been sent</p>

<button onclick="closePop()">OK</button>

</div>

</div>



<script>



function showPopup(){

document.getElementById("popup").classList.add("show")

}


function closePop(){

document.getElementById("popup").classList.remove("show")

}



function sendData(){


let name=document.getElementById("name").value
let phone=document.getElementById("phone").value
let date=document.getElementById("date").value
let time=document.getElementById("time").value
let style=document.getElementById("style").value
let color=document.getElementById("color").value
let length=document.getElementById("length").value
let location=document.getElementById("location").value
let feedback=document.getElementById("feedback").value
let rating=document.getElementById("rating").value


let ext=""

if(document.getElementById("ext1").checked){
ext+="Buying "
}

if(document.getElementById("ext2").checked){
ext+="Bringing"
}


let msg=

"New Booking%0A"+
"Name:"+name+"%0A"+
"Phone:"+phone+"%0A"+
"Date:"+date+"%0A"+
"Time:"+time+"%0A"+
"Style:"+style+"%0A"+
"Color:"+color+"%0A"+
"Length:"+length+"%0A"+
"Location:"+location+"%0A"+
"Extension:"+ext+"%0A"+
"Feedback:"+feedback+"%0A"+
"Rating:"+rating


showPopup()


setTimeout(function(){

window.open(
"https://wa.me/2348032178073?text="+msg
)

},500)


return true

}


</script>



</body>
</html>
