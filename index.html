<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hair by Nnaya</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:radial-gradient(circle at top,#ff6600,#000);
color:white;
display:flex;
justify-content:center;
}

/* APP SCREEN */

.app{
width:100%;
max-width:420px;
min-height:100vh;
background:rgba(0,0,0,0.85);
box-shadow:0 0 40px orange;
}

/* HEADER */

.header{
text-align:center;
padding:40px 20px;
background:linear-gradient(135deg,#000,#ff6600);
box-shadow:0 0 25px orange;
}

.title{
font-family:"Playfair Display";
font-size:42px;
}

.subtitle{
font-size:14px;
}

/* CARD */

.card{
margin:20px;
padding:20px;
border-radius:25px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
box-shadow:0 0 20px orange;
}

/* INPUT */

label{
display:block;
margin-top:10px;
}

input,select,textarea{
width:100%;
padding:12px;
margin-top:5px;
border:none;
border-radius:15px;
background:rgba(255,255,255,0.2);
color:white;
}

.row{
display:flex;
gap:15px;
}

/* BUTTON */

button{
width:100%;
padding:14px;
margin-top:20px;
border:none;
border-radius:20px;
font-size:18px;
background:orange;
color:white;
cursor:pointer;
}

button:hover{
background:#ff6600;
}

/* POPUP */

.popup{
position:fixed;
bottom:-100%;
left:0;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:flex-end;
background:rgba(0,0,0,0.6);
transition:0.4s;
}

.popup.show{
bottom:0;
}

.popup-box{
background:white;
color:black;
width:90%;
max-width:400px;
padding:20px;
border-radius:20px 20px 0 0;
text-align:center;
}

</style>
</head>

<body>

<div class="app">

<div class="header">
<div class="title">Hair by Nnaya</div>
<div class="subtitle">Luxury Braids • Book Now</div>
</div>

<form action="https://formsubmit.co/preshuka490@gmail.com" method="POST" onsubmit="sendData()">

<div class="card">

<label>Name</label>
<input id="name" name="Name" required>

<label>Phone</label>
<input id="phone" name="Phone" required>

<label>Date</label>
<input id="date" type="date" name="Date">

<label>Time</label>
<input id="time" type="time" name="Time">

<label>Style</label>
<input id="style" name="Style">

<label>Color</label>
<input id="color" name="Color">

<label>Length</label>
<select id="length" name="Length">
<option>Short</option>
<option>Medium</option>
<option>Long</option>
</select>

<label>Location</label>
<select id="location" name="Location">
<option>Salon</option>
<option>Home Service</option>
</select>

<label>Extension</label>
<div class="row">
<label><input id="ext1" type="checkbox"> Buying</label>
<label><input id="ext2" type="checkbox"> Bringing</label>
</div>

<label>Feedback</label>
<textarea id="feedback" name="Feedback"></textarea>

<label>Rating</label>
<select id="rating" name="Rating">
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
</select>

<button type="submit" onclick="showPopup()">Book Now</button>

</div>
</form>

</div>

<div class="popup" id="popup">
<div class="popup-box">

<h3>
Thank you for booking with Hair by Nnaya ✨
</h3>

<p>
Your appointment request has been sent
</p>

<button onclick="closePop()">OK</button>

</div>
</div>

<script>

function showPopup(){
document.getElementById("popup").classList.add("show")
}

function closePop(){
document.getElementById("popup").classList.remove("show")
}

function sendData(){

let name=document.getElementById("name").value
let phone=document.getElementById("phone").value
let date=document.getElementById("date").value
let time=document.getElementById("time").value
let style=document.getElementById("style").value
let color=document.getElementById("color").value
let length=document.getElementById("length").value
let location=document.getElementById("location").value
let feedback=document.getElementById("feedback").value
let rating=document.getElementById("rating").value

let ext=""

if(document.getElementById("ext1").checked){
ext+="Buying "
}

if(document.getElementById("ext2").checked){
ext+="Bringing"
}

let msg=
"New Booking%0A"+
"Name: "+name+"%0A"+
"Phone: "+phone+"%0A"+
"Date: "+date+"%0A"+
"Time: "+time+"%0A"+
"Style: "+style+"%0A"+
"Color: "+color+"%0A"+
"Length: "+length+"%0A"+
"Location: "+location+"%0A"+
"Extension: "+ext+"%0A"+
"Feedback: "+feedback+"%0A"+
"Rating: "+rating

window.open(
"https://wa.me/2348032178073?text="+msg
)

}

</script>

</body>
</html>
