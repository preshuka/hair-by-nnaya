<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Hair by Nnaya</title>

<style>

body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#000,#0a0a0a,#111);
    color:white;
}

/* ===== HEADER ===== */

.header{
    text-align:center;
    padding:50px 20px;
    background: linear-gradient(135deg,#000,orange,#000);
    box-shadow:0 0 40px orange;
}

.header img{
    width:140px;
    height:140px;
    border-radius:50%;
    border:5px solid white;
    object-fit:cover;
}

.title{
    font-size:60px;
    font-weight:900;
    letter-spacing:2px;
    margin-top:10px;
}

.subtitle{
    font-size:18px;
    color:#ffd699;
    margin-top:5px;
}

/* ===== FORM ===== */

.container{
    max-width:600px;
    margin:40px auto;
    background:rgba(0,0,0,0.8);
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 25px orange;
}

h2{
    text-align:center;
    color:orange;
}

label{
    margin-top:15px;
    display:block;
    font-size:14px;
}

input,select,textarea{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    margin-top:5px;
    background:#222;
    color:white;
}

/* CHECKBOX ALIGN */

.row{
    display:flex;
    gap:20px;
    align-items:center;
}

.row input{
    width:auto;
}

/* BUTTON */

button{
    width:100%;
    padding:14px;
    margin-top:20px;
    background:orange;
    border:none;
    font-size:18px;
    font-weight:bold;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:#ff9900;
}

/* PRICE */

.prices{
    margin-top:30px;
    background:black;
    padding:15px;
    border-radius:10px;
    box-shadow:0 0 10px orange;
}

.prices h3{
    color:orange;
    text-align:center;
}

.prices p{
    margin:6px 0;
}

/* POPUP */

.popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    display:none;
    justify-content:center;
    align-items:center;
}

.popup-box{
    background:white;
    color:black;
    padding:25px;
    border-radius:12px;
    text-align:center;
}

</style>

</head>

<body>

<div class="header">

<img src="logo.png">

<div class="title">Hair by Nnaya</div>

<div class="subtitle">
Luxury Braids • Salon & Home Service • Book Your Style
</div>

</div>

<div class="container">

<h2>Book Appointment</h2>

<label>Name</label>
<input type="text">

<label>Phone</label>
<input type="text">

<label>Date</label>
<input type="date">

<label>Time</label>
<input type="time">

<label>Style</label>
<input type="text">

<label>Color</label>
<input type="text">

<label>Length</label>
<select>
<option>Short</option>
<option>Medium</option>
<option>Long</option>
</select>

<label>Location</label>
<select>
<option>Salon</option>
<option>Home Service</option>
</select>

<label>Extension</label>

<div class="row">
<input type="checkbox"> Buying
<input type="checkbox"> Bringing
</div>

<label>Upload Style</label>
<input type="file">

<label>Feedback</label>
<textarea></textarea>

<label>Rating</label>
<select>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
</select>

<button onclick="book()">Book Now</button>

<div class="prices">

<h3>Price List</h3>

<p>Braids — 3000</p>
<p>Knotless — 5000</p>
<p>Weaving — 7000</p>
<p>Luxury Style — 10000</p>

</div>

</div>

<div class="popup" id="popup">

<div class="popup-box">

<h3>Booking Sent</h3>

<p>Email & WhatsApp notification ready</p>

<button onclick="closePop()">OK</button>

</div>

</div>

<script>

function book(){
document.getElementById("popup").style.display="flex"
}

function closePop(){
document.getElementById("popup").style.display="none"
}

</script>

</body>
</html>
