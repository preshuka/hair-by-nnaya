<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Hair by Nnaya</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: Poppins, sans-serif;
            background: linear-gradient(135deg, #000, #111, #1a1a1a);
            color: white;
        }


        /* ===== GRAPHICS ===== */

        .banner {
            background: linear-gradient(90deg, #ff6a00, #ff8c00, #ffd6a3);
            text-align: center;
            padding: 35px 10px;
            box-shadow: 0 4px 20px black;
        }

        .banner h1 {
            margin: 0;
            font-size: 38px;
            letter-spacing: 3px;
            font-weight: 900;
            color: black;
        }

        .banner p {
            margin: 5px 0 0 0;
            font-size: 14px;
            font-weight: 500;
            color: #111;
        }


        /* ===== HEADER ===== */

        header {
            text-align: center;
            padding: 10px;
        }

        .logo {
            width: 150px;
            border-radius: 10px;
        }


        /* ===== CARD ===== */

        .card {
            max-width: 420px;
            margin: 20px auto;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(0, 0, 0, 0.7);
        }


        /* ===== SECTION ===== */

        .section {
            max-width: 420px;
            margin: 20px auto;
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 15px;
        }


        /* ===== INPUT ===== */

        label {
            display: block;
            margin-top: 10px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border: none;
            border-radius: 8px;
            background: #1f1f1f;
            color: white;
        }


        /* ===== OPTIONS ===== */

        .optionBox {
            background: #181818;
            padding: 10px;
            border-radius: 10px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }


        /* ===== BUTTON ===== */

        button {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            background: linear-gradient(90deg, #ff6a00, #ffb347);
            color: white;
        }

        button:hover {
            transform: scale(1.03);
        }

        button:active {
            transform: scale(0.95);
        }


        /* ===== POPUP ===== */

        #popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            align-items: center;
            justify-content: center;
        }

        .popupBox {
            background: #111;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px orange;
            text-align: center;
        }


        /* ===== BOX ===== */

        .reviewBox {
            background: #1a1a1a;
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
        }


        footer {
            text-align: center;
            padding: 20px;
            color: #aaa;
        }
    </style>

</head>

<body>



    <div class="banner">

        <h1>HAIR BY NNAYA</h1>

        <p>
            Premium Styling • Home Service Available • Book Your Appointment Now
        </p>

    </div>


    <header>

        <img src="nnaya.png" class="logo">

    </header>




    <!-- BOOKING FORM -->

    <div class="card">

        <form id="bookingForm">


            <label>Name</label>
            <input id="name" required>


            <label>Phone</label>
            <input id="phone" required>


            <label>Email</label>
            <input id="email">


            <label>Date</label>
            <input type="date" id="date">


            <label>Time</label>
            <input type="time" id="time">


            <label>Style</label>
            <input>


            <label>Color</label>

            <select>
                <option>Black</option>
                <option>Brown</option>
                <option>Blonde</option>
                <option>Red</option>
            </select>


            <label>Length</label>

            <select>
                <option>Short</option>
                <option>Medium</option>
                <option>Long</option>
            </select>



            <label>Location</label>

            <div class="optionBox">

                <label><input type="radio" name="loc"> Saloon</label>
                <label><input type="radio" name="loc"> Home Service</label>

            </div>



            <label>Extension</label>

            <div class="optionBox">

                <label><input type="checkbox"> Buy Extension</label>
                <label><input type="checkbox"> Bring Extension</label>

            </div>



            <label>Upload Style</label>

            <input type="file">


            <textarea placeholder="Extra notes"></textarea>


            <button>

                Book Appointment

            </button>

        </form>

    </div>



    <!-- PRICE LIST BELOW FORM -->

    <div class="section">

        <h2>Price List</h2>

        <div class="reviewBox">Braids — 5000</div>
        <div class="reviewBox">Knotless — 7000</div>
        <div class="reviewBox">Wig Install — 8000</div>
        <div class="reviewBox">Home Service — 10000</div>

    </div>



    <!-- POPUP -->

    <div id="popup">

        <div class="popupBox">

            <h2>Appointment Received</h2>

            <p>

                Your booking has been sent
                Hair by Nnaya will contact you on WhatsApp

            </p>

            <button onclick="closePopup()">OK</button>

        </div>

    </div>



    <!-- ADMIN -->

    <div class="section">

        <h2>Admin Bookings</h2>

        <button onclick="showBookings()">Show</button>

        <div id="bookingList"></div>

    </div>



    <footer>

        Hair by Nnaya © 2026

    </footer>



    <script>

        function closePopup() {
            popup.style.display = "none"
        }



        bookingForm.addEventListener("submit", function (e) {

            e.preventDefault()

            let booking = {
                name: name.value,
                phone: phone.value,
                date: date.value,
                time: time.value
            }

            let list =
                JSON.parse(localStorage.getItem("bookings")) || []

            list.push(booking)

            localStorage.setItem(
                "bookings",
                JSON.stringify(list)
            )

            let msg =
                "New Booking%0A" +
                name.value + "%0A" +
                phone.value


            window.open(
                "https://wa.me/2348032178073?text=" + msg
            )

            location.href =
                "mailto:preshuka490@gmail.com?subject=Booking&body=" + msg


            popup.style.display = "flex"

        })



        function showBookings() {

            let list =
                JSON.parse(localStorage.getItem("bookings")) || []

            let html = ""

            list.forEach(b => {

                html +=
                    "<div class='reviewBox'>" +
                    b.name + " | " +
                    b.phone + " | " +
                    b.date + " | " +
                    b.time +
                    "</div>"

            })

            bookingList.innerHTML = html

        }

    </script>

</body>

</html>
